<html lang="en">
<head>
    <meta charset="UTF-8">

```
<style>
    *{
        margin:0;
        padding:0;
        box-sizing:border-box;
        font-family:'Segoe UI',sans-serif;
    }

    body{
        background: linear-gradient(135deg,#667eea,#764ba2);
        min-height:100vh;
        display:flex;
        justify-content:center;
        align-items:center;
        padding:20px;
    }

    .container{
        background:white;
        width:90%;
        max-width:800px;
        padding:30px;
        border-radius:20px;
        box-shadow:0 15px 35px rgba(0,0,0,0.2);
    }

    h1{
        text-align:center;
        color:#333;
        margin-bottom:10px;
    }

    .subtitle{
        text-align:center;
        color:#777;
        margin-bottom:25px;
    }

    textarea{
        width:100%;
        height:150px;
        padding:15px;
        border:2px solid #ddd;
        border-radius:12px;
        resize:none;
        font-size:16px;
    }

    textarea:focus{
        outline:none;
        border-color:#667eea;
    }

    button{
        width:100%;
        padding:14px;
        margin-top:15px;
        border:none;
        border-radius:12px;
        background:#667eea;
        color:white;
        font-size:18px;
        cursor:pointer;
        transition:0.3s;
    }

    button:hover{
        background:#5a67d8;
    }

    .result{
        margin-top:25px;
        display:none;
    }

    .card{
        background:#f8f9ff;
        padding:15px;
        border-radius:12px;
        margin-bottom:12px;
        border-left:5px solid #667eea;
    }

    .label{
        font-weight:bold;
        color:#444;
    }
</style>
```

</head>
<body>

<div class="container">

```
<h1>🤖 AI Complaint Classifier</h1>
<p class="subtitle">
    Analyze customer complaints using Machine Learning
</p>

<textarea
    id="complaint"
    placeholder="Enter customer complaint here..."></textarea>

<button onclick="analyzeComplaint()">
    Analyze Complaint
</button>

<div class="result" id="resultBox">

    <div class="card">
        <span class="label">Category:</span>
        <span id="category"></span>
    </div>

    <div class="card">
        <span class="label">Confidence:</span>
        <span id="confidence"></span>
    </div>

    <div class="card">
        <span class="label">Urgency Score:</span>
        <span id="urgency"></span>
    </div>

    <div class="card">
        <span class="label">Keywords:</span>
        <span id="keywords"></span>
    </div>

    <div class="card">
        <span class="label">AI Response:</span>
        <span id="reply"></span>
    </div>

</div>
```

</div>

<script>
async function analyzeComplaint(){

    const text=document.getElementById("complaint").value;

    const response=await fetch("/predict",{
        method:"POST",
        headers:{
            "Content-Type":"application/json"
        },
        body:JSON.stringify({text:text})
    });

    const data=await response.json();

    document.getElementById("resultBox").style.display="block";

    document.getElementById("category").innerText=data.category;
    document.getElementById("confidence").innerText=data.confidence + "%";
    document.getElementById("urgency").innerText=data.urgency;
    document.getElementById("keywords").innerText=data.keywords.join(", ");
    document.getElementById("reply").innerText=data.ai_reply;
}
</script>

</body>
</html>
